name: API CI - Build & Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write
  pull-requests: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: api
  CONTEXT: apps/api

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Build image + run all security scans
  # ──────────────────────────────────────────────────────────────────────────
  scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=${{ github.event.inputs.tag || 'latest' }}

      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SAST: Semgrep source code analysis ────────────────────────────────
      - name: SAST - Semgrep (source code analysis)
        run: |
          python -m pip install semgrep --quiet
          semgrep \
            --config p/golang \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            ${{ env.CONTEXT }}
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Semgrep SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: sast-semgrep

      # ── Misconfig: Trivy Dockerfile + IaC linting ─────────────────────────
      - name: Misconfig - Trivy Dockerfile & IaC lint
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.CONTEXT }}
          scanners: misconfig
          format: table
          exit-code: 0
          output: trivy-misconfig-report.txt

      # ── SCA: Trivy dependency scan ─────────────────────────────────────────
      - name: SCA - Trivy Dependency Scan (Go modules)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.CONTEXT }}
          scanners: vuln
          format: json
          exit-code: 0
          output: trivy-sca-report.json

      # ── Image scan ─────────────────────────────────────────────────────────
      - name: Image - Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.tags }}
          format: table
          exit-code: 0
          output: trivy-image-report.txt

      # ── SBOM ───────────────────────────────────────────────────────────────
      - name: SBOM - Trivy SPDX generation
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.CONTEXT }}
          format: spdx-json
          exit-code: 0
          output: trivy-sbom.spdx.json
          scanners: vuln

      # ── Upload scan artifacts ──────────────────────────────────────────────
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: |
            semgrep.sarif
            trivy-misconfig-report.txt
            trivy-sca-report.json
            trivy-image-report.txt
            trivy-sbom.spdx.json
          retention-days: 30

      # ── Combine reports for PR comment ────────────────────────────────────
      - name: Combine scan reports
        id: scan-report
        run: |
          {
            echo "REPORT<<EOF"
            echo "## Security Scan Results - ${{ env.IMAGE_NAME }}"
            echo ""

            echo "### SAST - Semgrep"
            echo '```'
            if [ -f semgrep.sarif ]; then
              result_count=$(jq '[.runs[].results[]] | length' semgrep.sarif 2>/dev/null || echo "0")
              echo "Total findings: $result_count"
              jq -r '
                .runs[].results[] |
                "  [\(.level // "note")] \(.ruleId // "?") — \(.locations[0].physicalLocation.artifactLocation.uri // "?"):\(.locations[0].physicalLocation.region.startLine // "?")"
              ' semgrep.sarif 2>/dev/null | head -30
              actual=$(jq '[.runs[].results[]] | length' semgrep.sarif 2>/dev/null || echo 0)
              [ "$actual" -gt 30 ] && echo "  ... and $((actual - 30)) more findings"
            else
              echo "No Semgrep report generated."
            fi
            echo '```'
            echo ""

            echo "### Misconfig - Trivy Dockerfile & IaC"
            echo '```'
            cat trivy-misconfig-report.txt 2>/dev/null || echo "No misconfig report generated."
            echo '```'
            echo ""

            echo "### SCA - Trivy Dependency Scan"
            echo '```'
            if [ -f trivy-sca-report.json ]; then
              vuln_count=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-sca-report.json 2>/dev/null || echo "0")
              echo "Total vulnerabilities found: $vuln_count"
              jq -r '
                .Results[]? | select(.Vulnerabilities) |
                "Target: \(.Target // "unknown")\n" +
                (.Vulnerabilities[] | "  - \(.VulnerabilityID // "N/A"): \(.PkgName // "?")@\(.InstalledVersion // "?") → \(.FixedVersion // "unfixed") | \(.Severity // "UNKNOWN")")
              ' trivy-sca-report.json 2>/dev/null | head -50
              [ "$vuln_count" -gt 50 ] && echo "  ... and $((vuln_count - 50)) more"
            else
              echo "No SCA report generated."
            fi
            echo '```'
            echo ""

            echo "### Image - Trivy Scan"
            echo '```'
            cat trivy-image-report.txt 2>/dev/null || echo "No image scan report generated."
            echo '```'
            echo ""

            echo "### SBOM - Dependency Inventory"
            echo '```'
            if [ -f trivy-sbom.spdx.json ]; then
              pkg_count=$(jq '.packages | length' trivy-sbom.spdx.json 2>/dev/null || echo "unknown")
              echo "Total packages: $pkg_count"
              jq -r '.packages[] | "  - \(.name // "unknown")@\(.versionInfo // "?")"' trivy-sbom.spdx.json 2>/dev/null | head -30
              [ "$pkg_count" -gt 30 ] 2>/dev/null && echo "  ... and $((pkg_count - 30)) more"
            else
              echo "No SBOM generated."
            fi
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR with scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.scan-report.outputs.REPORT }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Push image to GHCR (only on push to main, not PR)
  # ──────────────────────────────────────────────────────────────────────────
  push:
    name: Push to GHCR
    needs: scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=${{ github.event.inputs.tag || 'latest' }}

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max