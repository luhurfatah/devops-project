name: Dev IaaC Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::103855224992:role/github-actions-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.54.3/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Run Checkov Security Scan
        working-directory: iaac/terragrunt/env/dev
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install checkov
          terragrunt plan -out=tfplan
          find . -name "tfplan" -exec sh -c 'cd $(dirname {}) && terraform show -json tfplan > plan.json' \;
          plan_json=$(find . -name "plan.json" -print -quit)
          if [ -n "$plan_json" ]; then
            ./venv/bin/checkov -f "$plan_json" --config-file $GITHUB_WORKSPACE/iaac/checkov.yaml
          else
            echo "Error: No plan.json generated!"
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::103855224992:role/github-actions-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terragrunt
        uses: actions/cache@v4
        id: cache-terragrunt
        with:
          path: /usr/local/bin/terragrunt
          key: terragrunt-v0_54_3-${{ runner.os }}-amd64

      - name: Setup Terragrunt
        if: steps.cache-terragrunt.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.54.3/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt ${{ github.event.inputs.action }}
        working-directory: iaac/terragrunt/env/dev
        run: |
          if [ "${{ github.event.inputs.action }}" == "plan" ]; then
            terragrunt run-all plan --terragrunt-non-interactive
          elif [ "${{ github.event.inputs.action }}" == "apply" ]; then
            terragrunt run-all apply -auto-approve --terragrunt-non-interactive
          elif [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terragrunt run-all destroy -auto-approve --terragrunt-non-interactive
          fi
