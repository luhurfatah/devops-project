apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aws-alb
  labels:
    app: kms
spec:
  controllerName: gateway.k8s.aws/load-balancer-controller
  description: "AWS ALB Gateway Class for KMS"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kms-gateway
  labels:
    app: kms
  annotations:
    # ALB scheme: internet-facing for public, internal for private
    alb.ingress.kubernetes.io/scheme: internet-facing
    # ALB IP address type
    alb.ingress.kubernetes.io/ip-address-type: ipv4
    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-port: "3000"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    # Target group configuration
    alb.ingress.kubernetes.io/target-type: ip
    # SSL redirect (disabled to match current ingress behavior)
    alb.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  gatewayClassName: aws-alb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    # Uncomment below to enable HTTPS with ACM certificate
