# ─── Development Environment Values ───────────────────────────
# Overrides for the kms-app Helm chart in dev environment.

global:
  environment: dev

replicaCount: 1

api:
  image:
    tag: "b5f3ea8"
  resources:
    requests:
      cpu: "128m"
      memory: "128Mi"
    limits:
      cpu: "256m"
      memory: "256Mi"

web:
  image:
    tag: "b5f3ea8"
  resources:
    requests:
      cpu: "64m"
      memory: "64Mi"
    limits:
      cpu: "128m"
      memory: "128Mi"

routes:
  api:
    hostnames:
      - api.dev.kms.example.com
    rules:
      - backendRefs:
          - name: kms-api
            port: 80
            weight: 1
  web:
    hostnames:
      - dev.kms.example.com
    rules:
      - backendRefs:
          - name: kms-web
            port: 80
            weight: 1