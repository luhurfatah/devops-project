# ─── Production Environment Values ────────────────────────────
# Overrides for the kms-app Helm chart in production environment.

global:
  environment: prod

replicaCount: 3

api:
  image:
    tag: "stable"
  resources:
    requests:
      cpu: "512m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

web:
  image:
    tag: "stable"
  resources:
    requests:
      cpu: "256m"
      memory: "256Mi"
    limits:
      cpu: "512m"
      memory: "512Mi"

routes:
  api:
    hostnames:
      - api.kms.example.com
    rules:
      - backendRefs:
          - name: kms-api
            port: 80
            weight: 1
  web:
    hostnames:
      - kms.example.com
    rules:
      - backendRefs:
          - name: kms-web
            port: 80
            weight: 1