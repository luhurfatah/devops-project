# ─── Production Environment Values ────────────────────────────
# Overrides for the kms-app Helm chart in production environment.

global:
  environment: prod

replicaCount: 3

api:
  image:
    tag: "stable"
  resources:
    requests:
      cpu: "512m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

web:
  image:
    tag: "stable"
  resources:
    requests:
      cpu: "256m"
      memory: "256Mi"
    limits:
      cpu: "512m"
      memory: "512Mi"

ingress:
  enabled: true
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  hostname: "api.example.com"