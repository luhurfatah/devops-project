# ─── Staging Environment Values ──────────────────────────────
# Overrides for the kms-app Helm chart in staging environment.

global:
  environment: staging

replicaCount: 2

api:
  image:
    tag: "staging"
  resources:
    requests:
      cpu: "256m"
      memory: "256Mi"
    limits:
      cpu: "512m"
      memory: "512Mi"

web:
  image:
    tag: "staging"
  resources:
    requests:
      cpu: "128m"
      memory: "128Mi"
    limits:
      cpu: "256m"
      memory: "256Mi"

routes:
  api:
    hostnames:
      - api.staging.kms.example.com
    rules:
      - backendRefs:
          - name: kms-api
            port: 80
            weight: 1
  web:
    hostnames:
      - staging.kms.example.com
    rules:
      - backendRefs:
          - name: kms-web
            port: 80
            weight: 1