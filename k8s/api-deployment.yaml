apiVersion: apps/v1
kind: Deployment
metadata:
  name: kms-api
  labels:
    app: kms
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kms
      component: api
  template:
    metadata:
      labels:
        app: kms
        component: api
    spec:
      containers:
        - name: kms-api
          image: kms-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kms-secret
                  key: database-url
            - name: PORT
              value: "8080"
            - name: SEED_DATA
              valueFrom:
                configMapKeyRef:
                  name: kms-config
                  key: seed-data
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kms-secret
                  key: admin-username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kms-secret
                  key: admin-password
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: kms-secret
                  key: auth-secret
            - name: AUTH_TTL_HOURS
              valueFrom:
                configMapKeyRef:
                  name: kms-config
                  key: auth-ttl-hours
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kms-api
  labels:
    app: kms
    component: api
spec:
  selector:
    app: kms
    component: api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP