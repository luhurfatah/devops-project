# ─── KMS Application Helm Values ──────────────────────────────
# Pure application chart — infrastructure (LB controller, Gateway API)
# is deployed separately via gateway-api-crds and gateway-api-resources.

# ─── Global Settings ───────────────────────────────────────────
global:
  nameOverride: ""
  fullnameOverride: ""

# ─── Application Configuration ─────────────────────────────────
configmap:
  name: kms-config
  data:
    seed-data: "true"
    auth-ttl-hours: "24"

secret:
  name: kms-secret
  # Override via --set or a separate values file
  data:
    database-url: "postgresql://kms:kms@kms-db:5432/kms?sslmode=disable"
    admin-username: "admin"
    admin-password: "changeme"
    auth-secret: "change-me-to-a-random-secret"

# ─── API Deployment ────────────────────────────────────────────
api:
  name: kms-api
  image:
    repository: kms-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 8080
  servicePort: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  probes:
    liveness:
      path: /api/health
      port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
    readiness:
      path: /api/health
      port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5

# ─── Web Deployment ────────────────────────────────────────────
web:
  name: kms-web
  image:
    repository: kms-web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 3000
  servicePort: 3000
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  probes:
    liveness:
      path: /
      port: 3000
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
    readiness:
      path: /
      port: 3000
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
