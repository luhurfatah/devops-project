# ─── Gateway API Resources Helm Values ────────────────────────
# Configures GatewayClass and Gateway resources for ALB integration.
# HTTPRoute resources are managed by the kms-app chart.

# ─── Global Settings ───────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

# ─── GatewayClass Configuration ────────────────────────────────
gatewayClass:
  name: aws-alb
  controllerName: gateway.k8s.aws/load-balancer-controller
  description: "AWS ALB Gateway Class"
  labels:
    app: kms

# ─── Gateway (ALB) Configuration ───────────────────────────────
gateway:
  name: kms-gateway
  namespace: default
  labels:
    app: kms
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/ip-address-type: ipv4
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-port: "3000"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/ssl-redirect: "false"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

# ─── HTTPRoute Configuration ───────────────────────────────────
# HTTPRoute resources are now managed in the kms-app chart.
# See k8s/charts/kms-app/templates/httproute.yaml and values.yaml
