# ─── Gateway API Resources Helm Values ────────────────────────
# Configures GatewayClass and Gateway resources for ALB integration.
# HTTPRoute resources are managed by the kms-app chart.

# ─── Global Settings ───────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

# ─── GatewayClass Configuration ────────────────────────────────
gatewayClass:
  name: aws-alb
  controllerName: gateway.k8s.aws/alb
  description: "AWS ALB Gateway Class"
  labels:
    app: kms

# ─── Gateway (ALB) Configuration ───────────────────────────────
gateway:
  name: kms-gateway
  namespace: default
  labels:
    app: kms
  annotations: {}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

# ─── LoadBalancerConfiguration ──────────────────────────────────
# Gateway API CRD for ALB-specific settings (replaces alb.ingress annotations)
loadBalancerConfiguration:
  scheme: internet-facing
  ipAddressType: ipv4

# ─── HTTPRoute Configuration ───────────────────────────────────
# HTTPRoute resources are now managed in the kms-app chart.
# See k8s/charts/kms-app/templates/httproute.yaml and values.yaml
