apiVersion: apps/v1
kind: Deployment
metadata:
  name: kms-web
  labels:
    app: kms
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kms
      component: web
  template:
    metadata:
      labels:
        app: kms
        component: web
    spec:
      containers:
        - name: kms-web
          image: kms-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: http://kms-api:8080
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kms-web
  labels:
    app: kms
    component: web
spec:
  selector:
    app: kms
    component: web
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP