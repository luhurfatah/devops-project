# Bootstrap Configuration — S3 state bucket and GitHub OIDC for AWS
# Run: python bootstrap.py config.yaml

project:
  name: "devops-project"
  region: "us-east-1"

# S3 State Bucket Configuration
s3:
  # Must be globally unique. Convention: <project>-terraform-state
  # bucket_name: "devops-project-terraform-state"  # Optional: omit to auto-generate with random suffix
  versioning: true
  encryption: true
  block_public_access: true
  force_destroy: false

# GitHub OIDC Provider Configuration
oidc:
  enabled: true
  provider_type: "github"
  github:
    organization: "luhurfatah"
    repository: "devops-project"
    # Tokens are issued per branch/tag/environment.
    # Add any branch that runs Terraform (e.g. main, develop).
    allowed_branches:
      - "main"
    # GitHub's canonical audience for AWS — do not change
    audience: "sts.amazonaws.com"

# IAM Role assumed by GitHub Actions via OIDC
iam:
  role_name: "github-actions-role"
  # Max duration in seconds (3600 = 1 hour; max 43200 = 12 hours)
  max_session_duration: 3600
  inline_policy_name: "devops-project-github-actions-policy"
  # Least-privilege S3 access for Terraform state operations
  inline_policy_statements:
    - effect: "Allow"
      actions:
        - "s3:ListBucket"
        - "s3:GetObject"
        - "s3:PutObject"
        - "s3:DeleteObject"
      resource:
        - "arn:aws:s3:::devops-project-terraform-state"
        - "arn:aws:s3:::devops-project-terraform-state/*"
  # AdministratorAccess lets Terraform manage all resources.
  # For production: replace with a scoped custom policy.
  managed_policy_arns:
    - "arn:aws:iam::aws:policy/AdministratorAccess"
  # Alternative: broader dev access without IAM/billing
  # managed_policy_arns:
  #   - "arn:aws:iam::aws:policy/PowerUserAccess"

# Tags applied to all created resources
tags:
  Project: "devops-project"
  ManagedBy: "bootstrap"
  Component: "infrastructure"